# Render Blueprint — deploy TransformATA as a single web service with a
# persistent disk.
# https://render.com/docs/blueprint-spec
#
# Notes:
# - The disk is mounted at <repo>/data, which persists the SQLite job queue,
#   canonical snapshots, outbox files, and (via TRANSFORMATA_CONFIG_DIR) the
#   live config. On first boot the config dir is seeded from the repo's
#   config/ tree; from then on the disk is the source of truth, so
#   admin-panel edits survive deploys and restarts.
# - Attaching a disk pins the service to a single instance and disables
#   zero-downtime deploys (fine here: the SQLite queue assumes one process).
# - Only HTTP is exposed, so the embedded SFTP *server* stays disabled here.
#   Use "sftp-poll" inbound endpoints (the app polls a remote SFTP server)
#   and "sftp" outbound endpoints (the app uploads to a remote SFTP server).
services:
  - type: web
    name: transformata
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: transformata-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: SFTP_SERVER_ENABLED
        value: "false"
      - key: TRANSFORMATA_CONFIG_DIR
        value: /opt/render/project/src/data/config
